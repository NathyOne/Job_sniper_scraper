services:
  - type: cron
    name: lead-generator-hourly
    runtime: python
    schedule: "0 * * * *"
    buildCommand: "pip install -r requirements.txt && playwright install --with-deps chromium"
    startCommand: "python run_spider.py"
    envVars:
      - key: RESULTS_PATH
        value: "/tmp/multi_jobs.tsv"
      - key: WEBHOOK_URL
        sync: false
      - key: WEBHOOK_MODE
        value: "json"
      - key: WEBHOOK_TIMEOUT
        value: "30"
